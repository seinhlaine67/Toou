<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Explore - TooU</title>
  <link rel="stylesheet" href="assets/css/explore.css">
  <link rel="stylesheet" href="assets/css/shared.css">
</head>
<body data-page="explore">
<div class="container">
  <div id="site-header"></div>

  <div id="type-tabs">
    <button class="type-btn active" data-type="all">All</button>
    <button class="type-btn" data-type="webtoon">Webtoon</button>
    <button class="type-btn" data-type="novel">Novel</button>
    <button class="type-btn" data-type="cartoon">Cartoon</button>
    <button class="type-btn" data-type="comics">Comics</button>
    <button class="type-btn" data-type="other">Other</button>
  </div>

  <div id="filter-tabs">
    <button class="filter-btn active" data-filter="all">All Genres</button>
    <button class="filter-btn" data-filter="Romance">Romance</button>
    <button class="filter-btn" data-filter="Action">Action</button>
    <button class="filter-btn" data-filter="Mystery">Mystery</button>
    <button class="filter-btn" data-filter="Fantasy">Fantasy</button>
    <button class="filter-btn" data-filter="Horror">Horror</button>
    <button class="filter-btn" data-filter="Comedy">Comedy</button>
  </div>

  <div class="section">
    <div class="section-title">Filtered Series</div>
    <div class="two-row-grid" id="filteredSeries"></div>
  </div>

  <div class="section">
    <div class="section-title">Popularity Ranking</div>
    <div class="horizontal-scroll" id="popularityRanking"></div>
  </div>

  <div class="section">
    <div class="section-title">Fall in Romance</div>
    <div class="horizontal-scroll" id="romanceSection"></div>
  </div>
  <div class="section">
    <div class="section-title">Get into Action</div>
    <div class="horizontal-scroll" id="actionSection"></div>
  </div>
  <div class="section">
    <div class="section-title">Mystery Tales</div>
    <div class="horizontal-scroll" id="mysterySection"></div>
  </div>
  <div class="section">
    <div class="section-title">Fantasy Realms</div>
    <div class="horizontal-scroll" id="fantasySection"></div>
  </div>
  <div class="section">
    <div class="section-title">Horror Zone</div>
    <div class="horizontal-scroll" id="horrorSection"></div>
  </div>
  <div class="section">
    <div class="section-title">Comedy Corner</div>
    <div class="horizontal-scroll" id="comedySection"></div>
  </div>

</div>

<div id="site-nav"></div>
<script src="assets/js/layout.js"></script>
<script src="assets/js/explore.js"></script>
</body>
</html>
